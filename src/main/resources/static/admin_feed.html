<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Feed Management - AlumniConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Admin specific theme colors */
        :root {
            --primary-color: #ef4444;
            /* Red for admin */
            --primary-hover: #dc2626;
        }

        .admin-badge {
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column; background-color: #0f172a;">

    <nav class="glass-panel"
        style="margin: 20px 5%; border-radius: 20px; z-index: 1000; border-left: 4px solid var(--primary-color);">
        <a href="admin.html" class="logo">
            <i class="fa-solid fa-user-shield"></i> Admin<span>Feed</span>
        </a>
        <ul class="nav-links">
            <li><a href="#" onclick="logout()" class="btn btn-secondary" style="border:none">Logout</a></li>
        </ul>
    </nav>

    <div class="dashboard-container" style="display: flex; min-height: calc(100vh - 100px);">
        <!-- Sidebar -->
        <aside class="glass-panel sidebar" style="height: 100%; border-radius: 20px; overflow-y: auto;">
            <div class="user-profile-mini">
                <div class="avatar" style="background: linear-gradient(135deg, #ef4444, #f97316);"><i
                        class="fa-solid fa-user-shield"></i></div>
                <h3 id="sidebarUserName">Admin</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted);">System Administrator</p>
            </div>

            <ul class="sidebar-nav">
                <li><a href="admin.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a></li>
                <li><a href="#" class="active"><i class="fa-solid fa-newspaper"></i> Manage Posts</a></li>
                <li><a href="#" onclick="openCreatePostModal()"><i class="fa-solid fa-bullhorn"></i> New
                        Announcement</a></li>
                <li><a href="admin.html#approvals"><i class="fa-solid fa-user-check"></i> Approvals</a></li>
                <li><a href="admin.html#events"><i class="fa-solid fa-calendar-days"></i> Events</a></li>
            </ul>
        </aside>

        <!-- Main Feed Layout -->
        <main class="main-content"
            style="flex: 1; max-width: 600px; margin: 0 auto; padding: 0 10px; padding-bottom: 20px;">
            <div class="page-header" style="display: block; text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 1.6rem; color: white;"><i class="fa-solid fa-shield-halved"></i> Global Moderation
                </h2>
                <p style="color:var(--text-muted);">Oversee all alumni posts and manage community content</p>
            </div>

            <div id="feedContainer" style="display:flex; flex-direction:column; gap:25px; padding-bottom: 50px;">
                <!-- Posts loop -->
                <div style="text-align:center; padding: 40px;">
                    <i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--text-muted)"></i>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Announcement Modal -->
    <div id="createPostModal" class="modal-backdrop hidden">
        <div class="glass-card modal-content"
            style="max-width: 500px; width: 90%; background: var(--glass-bg); backdrop-filter: blur(10px); border-top: 3px solid var(--primary-color);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;"><i class="fa-solid fa-bullhorn"></i> Official Announcement</h3>
                <button class="close-modal" style="position:static" onclick="closeCreatePostModal()">×</button>
            </div>

            <div style="display:flex; gap:15px;">
                <div class="avatar"
                    style="width:40px;height:40px;font-size:1rem;margin:0; background: linear-gradient(135deg, #ef4444, #f97316);">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div style="flex-grow:1;">
                    <textarea id="postContent" class="form-control"
                        placeholder="Write an official announcement to all alumni..." rows="4"
                        style="resize:none; margin-bottom:10px;"></textarea>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <label for="postImageBtn" class="btn btn-secondary"
                                style="padding:0.4rem 0.8rem; font-size:0.85rem; cursor:pointer;">
                                <i class="fa-solid fa-image"></i> Attach Media
                            </label>
                            <input type="file" id="postImageBtn" accept="image/*" class="hidden"
                                onchange="previewPostImage()">
                            <span id="postImageName"
                                style="font-size:0.8rem; margin-left:10px; color:var(--text-muted);"></span>
                        </div>
                        <button class="btn btn-primary" onclick="createPost()">Broadcast</button>
                    </div>
                    <img id="postImagePreview" class="hidden"
                        style="max-width:100%; max-height:200px; margin-top:10px; border-radius:10px;" />
                </div>
            </div>
        </div>
    </div>

    <script>
        // Authentication Check
        if (localStorage.getItem('userType') !== 'ADMIN') {
            window.location.href = 'login.html';
        }

        const userData = JSON.parse(localStorage.getItem('userData'));
        document.getElementById('sidebarUserName').textContent = (userData.username || "Admin").toUpperCase();

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function openCreatePostModal() {
            document.getElementById('createPostModal').classList.remove('hidden');
        }

        function closeCreatePostModal() {
            document.getElementById('createPostModal').classList.add('hidden');
        }

        // ================= FEED LOGIC =================
        let currentPostImageBase64 = null;

        function previewPostImage() {
            const file = document.getElementById('postImageBtn').files[0];
            if (!file) return;
            document.getElementById('postImageName').textContent = file.name;
            const reader = new FileReader();
            reader.onload = function (e) {
                currentPostImageBase64 = e.target.result;
                const preview = document.getElementById('postImagePreview');
                preview.src = currentPostImageBase64;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content && !currentPostImageBase64) {
                Swal.fire('Empty Post', 'Please add some text or an image.', 'warning');
                return;
            }

            try {
                const res = await fetch('http://localhost:8080/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        authorId: userData.id || 'admin',
                        authorName: userData.username || 'System Admin',
                        authorRole: "ADMIN",
                        content: content,
                        imageBase64: currentPostImageBase64
                    })
                });

                if (res.ok) {
                    Swal.fire({ icon: 'success', title: 'Broadcasted!', showConfirmButton: false, timer: 1500 });
                    document.getElementById('postContent').value = '';
                    document.getElementById('postImageBtn').value = '';
                    document.getElementById('postImageName').textContent = '';
                    document.getElementById('postImagePreview').classList.add('hidden');
                    currentPostImageBase64 = null;
                    closeCreatePostModal();
                    loadFeed();
                }
            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'Failed to create announcement', 'error');
            }
        }

        async function loadFeed() {
            try {
                const res = await fetch('http://localhost:8080/api/posts');
                const posts = await res.json();
                const container = document.getElementById('feedContainer');

                if (posts.length === 0) {
                    container.innerHTML = '<div class="glass-card" style="text-align:center; padding: 40px;"><p style="color:var(--text-muted);">No posts found in the community.</p></div>';
                    return;
                }

                container.innerHTML = posts.map(p => {
                    const d = new Date(p.timestamp);
                    const timeString = isNaN(d) ? 'Just now' : d.toLocaleString();
                    const isAdmin = p.authorRole === 'ADMIN';

                    return `
                    <div class="glass-card" style="padding: 20px; position:relative; border-left: ${isAdmin ? '4px solid #ef4444' : 'none'};">
                        <div style="position:absolute; top:20px; right:20px;">
                            <button class="btn btn-danger" style="padding:0.4rem 0.8rem; font-size:0.8rem;" onclick="deletePost('${p.id}')">
                                <i class="fa-solid fa-trash-can"></i> Moderation delete
                            </button>
                        </div>
                        
                        <div style="display:flex; align-items:center; gap: 12px; margin-bottom: 15px;">
                            <div class="avatar" style="width: 45px; height: 45px; font-size: 1.1rem; margin:0; ${isAdmin ? 'background: linear-gradient(135deg, #ef4444, #f97316);' : ''}">
                                ${isAdmin ? '<i class="fa-solid fa-user-shield"></i>' : (p.authorName ? p.authorName.charAt(0).toUpperCase() : '?')}
                            </div>
                            <div>
                                <h3 style="margin:0; font-size:1.1rem; color: #fff;">${p.authorName} ${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</h3>
                                <p style="margin:0; font-size:0.8rem; color:var(--text-muted)">${timeString}</p>
                            </div>
                        </div>
                        
                        ${p.content ? `<p style="margin-bottom: ${p.imageBase64 ? '15px' : '0'}; line-height:1.6; color: #e2e8f0; font-size: 0.95rem;">${p.content}</p>` : ''}
                        
                        ${p.imageBase64 ? `<img src="${p.imageBase64}" style="width: 100%; border-radius: 12px; margin-top: 5px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);" />` : ''}
                    </div>
                `}).join('');
            } catch (e) {
                container.innerHTML = '<p class="error">Failed to load feed</p>';
            }
        }

        async function deletePost(postId) {
            Swal.fire({
                title: 'Moderation Action',
                text: "Are you sure you want to delete this community post?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#475569',
                confirmButtonText: 'Yes, delete it!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`http://localhost:8080/api/posts/${postId}`, { method: 'DELETE' });
                        if (res.ok) {
                            Swal.fire('Deleted!', 'Post has been removed from the system.', 'success');
                            loadFeed();
                        } else {
                            Swal.fire('Error', 'Failed to delete the post.', 'error');
                        }
                    } catch (e) { console.error(e); }
                }
            });
        }

        loadFeed();
    </script>
</body>

</html>
