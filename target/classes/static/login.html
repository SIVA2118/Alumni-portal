<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlumniConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
</head>

<body>

    <nav class="glass-panel" style="margin: 20px 5%; border-radius: 20px;">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-graduation-cap"></i> Alumni<span>Connect</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="register.html" class="btn btn-primary" style="color:white">Join Network</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="glass-panel auth-form">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to access your alumni dashboard</p>

            <div style="display:flex; justify-content:center; gap: 10px; margin-bottom: 20px;">
                <label>
                    <input type="radio" name="role" value="alumni" checked onchange="toggleRole()"> Alumni
                </label>
                <label>
                    <input type="radio" name="role" value="admin" onchange="toggleRole()"> Admin
                </label>
            </div>

            <form id="loginForm">
                <div class="form-group" id="emailGroup">
                    <label>Email or Username</label>
                    <input type="text" id="email" class="form-control" placeholder="Enter email or username">
                </div>

                <div class="form-group hidden" id="usernameGroup">
                    <label>Admin Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter admin username">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Portal</button>
            </form>

            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script>
        function toggleRole() {
            const isAlumni = document.querySelector('input[name="role"]:checked').value === 'alumni';
            if (isAlumni) {
                document.getElementById('emailGroup').classList.remove('hidden');
                document.getElementById('email').required = true;
                document.getElementById('usernameGroup').classList.add('hidden');
                document.getElementById('username').required = false;
            } else {
                document.getElementById('emailGroup').classList.add('hidden');
                document.getElementById('email').required = false;
                document.getElementById('usernameGroup').classList.remove('hidden');
                document.getElementById('username').required = true;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const role = document.querySelector('input[name="role"]:checked').value;
            const password = document.getElementById('password').value;

            let url = '';
            let payload = {};

            if (role === 'alumni') {
                url = 'http://localhost:8080/api/login';
                payload = { email: document.getElementById('email').value, password: password };
            } else {
                url = 'http://localhost:8080/api/admin/login';
                payload = { username: document.getElementById('username').value, password: password };
            }

            try {
                // Show loading
                Swal.fire({
                    title: 'Logging in...',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Login Successful!',
                    text: 'Redirecting to your dashboard...',
                    timer: 1500,
                    showConfirmButton: false
                });

                // Save user info
                localStorage.setItem('userData', JSON.stringify(data));
                localStorage.setItem('userType', role.toUpperCase());

                setTimeout(() => {
                    window.location.href = role === 'alumni' ? 'dashboard.html' : 'admin.html';
                }, 1500);

            } catch (error) {
                const isNotApproved = error.message.includes("Account not approved");
                Swal.fire({
                    icon: isNotApproved ? 'warning' : 'error',
                    title: isNotApproved ? 'Account Pending' : 'Login Failed',
                    text: error.message,
                    confirmButtonColor: isNotApproved ? '#f59e0b' : '#ef4444'
                });
            }
        });
    </script>
</body>

</html>
